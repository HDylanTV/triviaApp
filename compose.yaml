services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - gradle-cache:/root/.gradle

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - node-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  gradle-cache:
  node-modules:
